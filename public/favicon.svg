<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <style>
      .writing-line {
        fill: none;
        stroke: #d4a574;
        stroke-width: 4;
        stroke-linecap: round;
        stroke-dasharray: 24;
        stroke-dashoffset: 24;
      }

      .line-1 { animation: drawLine1 3s ease-out infinite; }
      .line-2 { animation: drawLine2 3s ease-out infinite; stroke-dasharray: 16; stroke-dashoffset: 16; }

      @keyframes drawLine1 {
        0%, 15% { stroke-dashoffset: 24; }
        40%, 100% { stroke-dashoffset: 0; }
      }
      @keyframes drawLine2 {
        0%, 45% { stroke-dashoffset: 16; }
        70%, 100% { stroke-dashoffset: 0; }
      }

      .quill {
        transform-origin: 40px 45px;
        animation: writeMotion 3s ease-in-out infinite;
      }

      @keyframes writeMotion {
        0%, 15% { transform: translate(0px, -18px) rotate(5deg); }
        15%, 40% { transform: translate(0px, -18px) rotate(-3deg); }
        40%, 45% { transform: translate(0px, -4px) rotate(5deg); }
        45%, 70% { transform: translate(0px, -4px) rotate(-3deg); }
        70%, 100% { transform: translate(0px, -18px) rotate(5deg); }
      }
    </style>
  </defs>

  <!-- Journal Outline -->
  <g id="journal">
    <rect x="8" y="12" width="48" height="40" rx="4" fill="none" stroke="#c4b8a8" stroke-width="4" />
    <line x1="32" y1="12" x2="32" y2="52" fill="none" stroke="#c4b8a8" stroke-width="4" />
  </g>

  <!-- Writing Lines -->
  <g id="text-lines">
    <line x1="16" y1="26" x2="40" y2="26" class="writing-line line-1" />
    <line x1="16" y1="40" x2="32" y2="40" class="writing-line line-2" />
  </g>

  <!-- Quill -->
  <g class="quill">
    <path d="M 40 45 L 36 34 C 36 34, 46 12, 58 6 C 54 20, 44 34, 44 34 Z" fill="#d4a574" />
    <polygon points="40,45 38,49 41,49" fill="#e8c496" />
  </g>
</svg>
